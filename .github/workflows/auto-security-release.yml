name: Auto Security Release

on:
  schedule:
    - cron: "0 19 * * 1" # Every Monday at 2pm UTC-5 (7pm UTC)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get last release tag
        id: last-tag
        run: |
          # Get the most recent semver tag.
          # Filters for tags for versions, sorts them in order and gets the latest
          LAST_TAG=$(git tag -l --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          # Only works if there's an existing version for the repo
          if [ -z "$LAST_TAG" ]; then
            echo "No release tags found. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Last release tag: $LAST_TAG"

      - name: Check for unreleased commits
        if: steps.last-tag.outputs.skip == 'false'
        id: check-commits
        run: |
          LAST_TAG="${{ steps.last-tag.outputs.tag }}"
          COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline)
          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LAST_TAG"
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_commits=true" >> "$GITHUB_OUTPUT"
          echo "Unreleased commits:"
          echo "$COMMITS"

      - name: Verify all commits are from dependabot
        if: steps.check-commits.outputs.has_commits == 'true'
        id: verify-authors
        run: |
          LAST_TAG="${{ steps.last-tag.outputs.tag }}"
          # Get unique authors (name + email) for commits since last tag, excluding merge commits
          NON_BOT_AUTHORS=$(git log "${LAST_TAG}..HEAD" --no-merges --format='%an <%ae>' | sort -u | grep -iv 'dependabot' || true)
          if [ -n "$NON_BOT_AUTHORS" ]; then
            echo "Non-dependabot commits found from:"
            echo "$NON_BOT_AUTHORS"
            echo "Skipping auto-release — only dependabot-only changes qualify."
            echo "dependabot_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "dependabot_only=true" >> "$GITHUB_OUTPUT"
          echo "All commits are from dependabot."

      - name: Bump version
        if: steps.verify-authors.outputs.dependabot_only == 'true'
        id: bump
        run: |
          CURRENT=$(jq -r .version package.json)
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW_VERSION="${major}.${minor}.$((patch + 1))"

          jq --arg v "$NEW_VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          jq --arg v "$NEW_VERSION" '.version = $v | .packages[""].version = $v' package-lock.json > tmp.json && mv tmp.json package-lock.json

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW_VERSION"

      - name: Update CHANGELOG
        if: steps.bump.outputs.new_version != ''
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          LAST_TAG: ${{ steps.last-tag.outputs.tag }}
        run: |
          # Collect dependabot PR references from merge commits
          PR_LINES=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            SUMMARY=$(echo "$line" | sed 's/^[a-f0-9]* //' | sed 's/ (#[0-9]*)$//')
            PR_LINES="${PR_LINES}\n- ${SUMMARY}"
          done <<< "$(git log "${LAST_TAG}..HEAD" --no-merges --oneline)"

          # Match existing format: ## <version> with ### ✨ Features and improvements
          ENTRY="## ${NEW_VERSION}\n\n### ✨ Features and improvements\n\n- Several dependency version updates\n${PR_LINES}\n"

          # Insert after the "# Changes" title line
          { head -1 CHANGELOG.md; echo ""; echo -e "$ENTRY"; tail -n +2 CHANGELOG.md; } > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

          echo "CHANGELOG.md updated for ${NEW_VERSION}"

      - name: Create Pull Request
        if: steps.bump.outputs.new_version != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-release/${{ steps.bump.outputs.new_version }}
          base: main
          commit-message: "chore: bump version to ${{ steps.bump.outputs.new_version }} (security patches)"
          title: "chore: release v${{ steps.bump.outputs.new_version }} — security dependency updates"
          body: |
            ## Automated Security Release

            This PR was auto-generated by the **Auto Security Release** workflow.

            ### What changed
            - Version bumped from `${{ steps.bump.outputs.current }}` → `${{ steps.bump.outputs.new_version }}`
            - `CHANGELOG.md` updated with dependency update entries
            - All changes since `${{ steps.last-tag.outputs.tag }}` are **dependabot-only** commits

            ### Why
            Security vulnerability patches were merged via Dependabot but no release has been
            published for downstream consumers. This patch release makes those fixes available.

            ### Before merging
            - [ ] Verify CI passes
            - [ ] Confirm no unintended changes are included
          labels: |
            automated
            security
            release
          delete-branch: true
